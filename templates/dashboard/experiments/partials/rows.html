{% for exp in experiments %}
<tr class="hover:bg-gray-50 transition-colors">
  <td class="px-6 py-4 font-medium text-gray-900">{{ exp.name }}</td>
  <td class="px-6 py-4">
    {% for tag in exp.tags %}
    <span class="inline-block bg-indigo-50 text-indigo-700 text-xs px-2 py-0.5 rounded-full mr-1">{{ tag }}</span>
    {% empty %}
    <span class="text-gray-400">—</span>
    {% endfor %}
  </td>
  <td class="px-6 py-4 text-gray-600">{{ exp.runs.count }}</td>
  <td class="px-6 py-4 text-gray-500">{{ exp.created_at|date:"M d, Y" }}</td>
  <td class="px-6 py-4 text-right">
    <a href="{% url 'dashboard:experiment-detail' exp.pk %}" class="text-indigo-600 hover:underline text-xs font-medium">View →</a>
  </td>
</tr>
{% empty %}
<tr>
  <td colspan="5" class="px-6 py-10 text-center text-gray-400 text-sm">No experiments found.</td>
</tr>
{% endfor %}
