{% extends "base.html" %}
{% block title %}Experiments — MLMonitor{% endblock %}

{% block content %}
<div class="mb-6 flex items-center justify-between">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Experiments</h1>
    <p class="text-gray-500 text-sm mt-1">All your training experiments</p>
  </div>
</div>

<div class="bg-white rounded-xl border border-gray-200 shadow-sm">
  <!-- Search bar (HTMX-powered) -->
  <div class="px-6 py-4 border-b border-gray-100">
    <input
      type="search"
      name="q"
      value="{{ query }}"
      placeholder="Search experiments by name…"
      class="w-full sm:w-80 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
      hx-get="{% url 'dashboard:experiment-list' %}"
      hx-trigger="input changed delay:300ms, search"
      hx-target="#experiment-rows"
      hx-include="[name='q']"
    >
  </div>

  <table class="w-full text-sm">
    <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
      <tr>
        <th class="px-6 py-3 text-left font-medium">Name</th>
        <th class="px-6 py-3 text-left font-medium">Tags</th>
        <th class="px-6 py-3 text-left font-medium">Runs</th>
        <th class="px-6 py-3 text-left font-medium">Created</th>
        <th class="px-6 py-3"></th>
      </tr>
    </thead>
    <tbody id="experiment-rows" class="divide-y divide-gray-100">
      {% include "dashboard/experiments/partials/rows.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
